name: Release

# Triggers a multi-platform Tauri build whenever you push a tag like `v0.9.4`
# or `v1.0.0`. The workflow creates a draft GitHub Release with bundles for
# Linux (.AppImage, .deb, .rpm), macOS (.dmg, universal), and Windows (.msi, .exe).
#
# To release a new version:
#   git tag v0.9.4
#   git push origin v0.9.4
#
# Then go to https://github.com/<you>/<repo>/releases, find the draft, edit
# the description, and publish.

on:
  push:
    tags:
      - 'v*'

# Lets the workflow create releases and upload assets to the repo.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          # ubuntu-24.04 ships WebKitGTK 2.44+, matching the stack on
          # rolling-release distros (Arch / CachyOS / Fedora rolling). The
          # older 22.04 image ships WebKitGTK 2.36, whose EGL/DMA-BUF code
          # path mismatches modern Mesa and crashes the webview on launch
          # with `Could not create default EGL display: EGL_BAD_PARAMETER`.
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # pnpm 10 because the repo's `pnpm-lock.yaml` was generated with
      # 10.x and `--frozen-lockfile` complains when a v9 runner reads
      # a v10 lockfile.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # `libayatana-appindicator3-dev` is the modern (Ayatana) fork that
      # Tauri 2 prefers; the legacy `libappindicator3-dev` package fails
      # the CMake feature checks. `libssl-dev` is needed by some transitive
      # Rust crates that build against system OpenSSL.
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `linuxdeploy` ships an old `strip` binary inside its AppImage
          # that doesn't recognize the `.relr.dyn` section emitted by
          # recent glibc — the AppImage step aborts mid-bundle with
          # `unknown type [0x13] section .relr.dyn`. Skipping the strip
          # is safe because system libs are already stripped, and dodges
          # the failure on any Ubuntu/glibc combo where it surfaces.
          NO_STRIP: 'true'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Courvux Notepad ${{ github.ref_name }}'
          releaseBody: |
            See the full changelog in the README.

            **Downloads below.** Pick the bundle for your OS:
            - **macOS**: `.dmg` — universal binary (Apple Silicon + Intel)
            - **Windows**: `.msi` (recommended) or `.exe`
            - **Linux**: `.AppImage` (portable), `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL)

            Builds are unsigned. macOS users may need to right-click → Open
            on first launch; Windows users may see a SmartScreen warning.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Bake `WEBKIT_DISABLE_DMABUF_RENDERER=1` into the AppImage's AppRun
      # so users on configs that mismatch the runner's EGL stack (NVIDIA
      # proprietary, Hyprland, some Wayland compositors) don't crash at
      # launch with `Could not create default EGL display`. The fallback
      # variable form (`${VAR:-1}`) lets a user reactivate the DMA-BUF
      # renderer with `WEBKIT_DISABLE_DMABUF_RENDERER=0 ./app.AppImage`
      # if it works on their machine.
      #
      # `tauri-action` already uploaded the original (unpatched) AppImage
      # to the draft release in the previous step, so this step rebuilds
      # the AppImage with the patched AppRun and overwrites the release
      # asset via `gh release upload --clobber`. Net effect: the asset
      # users download is the patched one.
      - name: Patch AppImage with EGL workaround
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          APPIMAGE=$(ls *.AppImage | head -n 1)
          ./"$APPIMAGE" --appimage-extract >/dev/null
          # Insert the env var on line 2 (right after the shebang) so the
          # webview process inherits it before WebKitGTK initializes.
          sed -i '2i export WEBKIT_DISABLE_DMABUF_RENDERER=${WEBKIT_DISABLE_DMABUF_RENDERER:-1}' squashfs-root/AppRun
          wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool
          # Overwrite the draft release's AppImage with the patched build.
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber --repo "${{ github.repository }}"
